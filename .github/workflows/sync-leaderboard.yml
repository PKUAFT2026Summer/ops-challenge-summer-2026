name: Sync Public Leaderboard

on:
  workflow_dispatch:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"

concurrency:
  group: sync-public-leaderboard
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: [self-hosted, grader]
    timeout-minutes: 15

    env:
      ACTIVE_TASK_CONFIG: /srv/opsChallengeNew/tasks/active_task.json
      CONDA_PYTHON_EXEC: /home/runner/miniconda3/envs/ops/bin/python
      LEADERBOARD_BASE_DIR: /srv/opsChallengeNew/leaderboard

    steps:
      - name: Checkout template repository
        uses: actions/checkout@v4
        env:
          GIT_CONFIG_COUNT: 3
          GIT_CONFIG_KEY_0: http.version
          GIT_CONFIG_VALUE_0: HTTP/1.1
          GIT_CONFIG_KEY_1: http.postBuffer
          GIT_CONFIG_VALUE_1: 524288000
          GIT_CONFIG_KEY_2: protocol.version
          GIT_CONFIG_VALUE_2: 1

      - name: Resolve active task
        run: |
          TASK_JSON=$(${CONDA_PYTHON_EXEC} -c "import json; config=json.load(open('${ACTIVE_TASK_CONFIG}')); print(config['active_task_path'])")
          TASK_ID=$(${CONDA_PYTHON_EXEC} -c "import json; config=json.load(open('${ACTIVE_TASK_CONFIG}')); print(config['active_task_id'])")

          echo "TASK_JSON=${TASK_JSON}" >> "$GITHUB_ENV"
          echo "TASK_ID=${TASK_ID}" >> "$GITHUB_ENV"

      - name: Render leaderboard
        run: |
          ${CONDA_PYTHON_EXEC} .github/scripts/render_leaderboard.py \
            --task-json "${TASK_JSON}" \
            --leaderboard-dir "${LEADERBOARD_BASE_DIR}" \
            --output LEADERBOARD.md

      - name: Commit leaderboard update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --porcelain -- LEADERBOARD.md)" ]; then
            echo "LEADERBOARD.md is already up to date."
            exit 0
          fi

          git add LEADERBOARD.md
          git commit -m "chore: sync public leaderboard [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
