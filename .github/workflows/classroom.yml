name: GitHub Classroom Workflow

on:
  workflow_run:
    workflows: ["Grade Submission"]
    types: [completed]
  workflow_dispatch:

permissions:
  actions: read
  checks: write
  contents: read

jobs:
  autograding:
    name: Autograding
    # Skip if triggered by classroom bot, or run if manual dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.actor.login != 'github-classroom[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Download grade result artifact
        id: download
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: grader-result
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Compute race score
        id: score
        run: |
          # Default to failure score if artifact missing or malformed
          if [ "${{ steps.download.outcome }}" != "success" ] || [ ! -f result.json ]; then
            echo "score=9999" >> $GITHUB_OUTPUT
            echo "status=ARTIFACT_MISSING" >> $GITHUB_OUTPUT
            echo "elapsed=N/A" >> $GITHUB_OUTPUT
            echo "feedback=⚠️ Grader did not produce valid results." >> $GITHUB_OUTPUT
            exit 0
          fi

          # Parse result.json for status and elapsed time
          STATUS=$(python3 -c "
          import json, sys
          try:
              with open('result.json') as f:
                  d = json.load(f)
              print(d.get('status', 'UNKNOWN'))
          except Exception as e:
              print('PARSE_ERROR', file=sys.stderr)
              print('PARSE_ERROR')
          ")

          ELAPSED=$(python3 -c "
          import json, sys
          try:
              with open('result.json') as f:
                  d = json.load(f)
              print(d.get('elapsed_seconds', 0))
          except Exception:
              print(0)
          ")

          # Race scoring rule: PASS = runtime in ms, FAIL = 9999
          if [ "$STATUS" = "PASS" ]; then
            SCORE=$(python3 -c "import math; print(max(1, int(round(float('${ELAPSED}') * 1000))))")
            EMOJI="✅"
          else
            SCORE=9999
            EMOJI=$(python3 -c "
          emoji_map = {
              'WRONG_ANSWER': '❌',
              'OOM': '🧠',
              'TIMEOUT': '⏱️',
              'RUNTIME_ERROR': '💥',
              'VERIFY_ERROR': '⚠️',
              'GRADER_ERROR': '🔧',
              'PARSE_ERROR': '📄',
              'ARTIFACT_MISSING': '🚫'
          }
          print(emoji_map.get('${STATUS}', '❓'))
          ")
          fi

          # Format elapsed time for display
          if [ "$STATUS" = "PASS" ]; then
            ELAPSED_DISPLAY=$(python3 -c "print(f'{float(\"${ELAPSED}\"):.3f}s')" 2>/dev/null || echo "${ELAPSED}s")
          else
            ELAPSED_DISPLAY="N/A"
          fi

          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "elapsed=$ELAPSED_DISPLAY" >> $GITHUB_OUTPUT
          echo "emoji=$EMOJI" >> $GITHUB_OUTPUT

          echo "📊 Computed Score: $SCORE ms (Status: $STATUS, Elapsed: $ELAPSED_DISPLAY)"

      - name: Submit to Classmoji Autograder
        uses: classmoji/autograder@main
        with:
          score: ${{ steps.score.outputs.score }}
          max-score: 9999
          feedback: |
            ## ${{ steps.score.outputs.emoji }} Race Result

            **Status**: `${{ steps.score.outputs.status }}`
            **Elapsed Time**: ${{ steps.score.outputs.elapsed }}
            **Numeric Score**: **${{ steps.score.outputs.score }} ms** (lower is better ⬇️)

            ---

            💡 **How scoring works:**
            - ✅ Pass all tests → Your score = actual runtime in milliseconds
            - ❌ Any test fails → Your score = 9999 ms (penalty)
            - 🏆 Lower scores rank higher on the leaderboard

            _Optimize your solution to minimize execution time!_
