name: GitHub Classroom Workflow

on:
  workflow_run:
    workflows: ["Grade Submission"]
    types: [completed]
  workflow_dispatch:

permissions:
  actions: read
  checks: write
  contents: read

jobs:
  autograding:
    name: Autograding
    # Skip if triggered by classroom bot, or run if manual dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.actor.login != 'github-classroom[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Download grade result artifact
        id: download
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: grader-result
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Compute race score
        id: score
        run: |
          # Default to failure score if artifact missing or malformed
          if [ "${{ steps.download.outcome }}" != "success" ] || [ ! -f result.json ]; then
            echo "score=9999" >> $GITHUB_OUTPUT
            echo "status=ARTIFACT_MISSING" >> $GITHUB_OUTPUT
            echo "elapsed=N/A" >> $GITHUB_OUTPUT
            echo "best_ms=9999" >> $GITHUB_OUTPUT
            echo "is_new_best=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Parse all fields from result.json in one pass
          python3 - <<'PY'
          import json, os, sys, math

          with open('result.json') as f:
              d = json.load(f)

          status    = d.get('status', 'UNKNOWN')
          elapsed   = float(d.get('elapsed_seconds') or 0)
          best_time = d.get('best_time')          # set by LeaderboardManager, None on first submission

          emoji_map = {
              'PASS':          '✅',
              'WRONG_ANSWER':  '❌',
              'OOM':           '🧠',
              'TIMEOUT':       '⏱️',
              'RUNTIME_ERROR': '💥',
              'VERIFY_ERROR':  '⚠️',
              'GRADER_ERROR':  '🔧',
          }
          emoji = emoji_map.get(status, '❓')

          # Current run score
          if status == 'PASS':
              current_ms = max(1, int(round(elapsed * 1000)))
          else:
              current_ms = 9999

          # Historical best score (best_time comes from LeaderboardManager post-update,
          # so it already reflects this submission — use it directly when PASS)
          if best_time is not None:
              best_ms = max(1, int(round(float(best_time) * 1000)))
          else:
              best_ms = current_ms   # first submission ever

          # Score to push = best across all submissions (lower is better)
          score = min(current_ms, best_ms)
          is_new_best = (status == 'PASS') and (current_ms <= best_ms)

          elapsed_display = f'{elapsed:.3f}s' if status == 'PASS' else 'N/A'
          best_display    = f'{best_ms} ms'

          print(f'📊 Run: {current_ms} ms | Historical best: {best_display} | Pushing: {score} ms')

          outputs = os.environ['GITHUB_OUTPUT']
          with open(outputs, 'a') as f:
              f.write(f'score={score}\n')
              f.write(f'status={status}\n')
              f.write(f'elapsed={elapsed_display}\n')
              f.write(f'best_ms={best_ms}\n')
              f.write(f'is_new_best={str(is_new_best).lower()}\n')
              f.write(f'emoji={emoji}\n')
          PY

      - name: Submit to Classmoji Autograder
        uses: classmoji/autograder@main
        with:
          score: ${{ steps.score.outputs.score }}
          max-score: 9999
          feedback: |
            ## ${{ steps.score.outputs.emoji }} Race Result

            **Status**: `${{ steps.score.outputs.status }}`
            **Elapsed Time**: ${{ steps.score.outputs.elapsed }}
            **Numeric Score**: **${{ steps.score.outputs.score }} ms** (lower is better ⬇️)

            ---

            💡 **How scoring works:**
            - ✅ Pass all tests → Your score = actual runtime in milliseconds
            - ❌ Any test fails → Your score = 9999 ms (penalty)
            - 🏆 Lower scores rank higher on the leaderboard

            _Optimize your solution to minimize execution time!_
