name: GitHub Classroom Workflow

on:
  workflow_run:
    workflows: ["Grade Submission"]
    types: [completed]

permissions:
  actions: read
  checks: write
  contents: read

jobs:
  autograding:
    name: Autograding
    # Skip assignment bootstrap commits from the classroom bot.
    if: github.event.workflow_run.actor.login != 'github-classroom[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Download grade result artifact
        id: download
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: grader-result
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Compute pass/fail feedback
        id: score
        run: |
          # Default to failure score if artifact missing or malformed
          if [ "${{ steps.download.outcome }}" != "success" ] || [ ! -f result.json ]; then
            echo "score=0" >> $GITHUB_OUTPUT
            echo "status=ARTIFACT_MISSING" >> $GITHUB_OUTPUT
            echo "elapsed=N/A" >> $GITHUB_OUTPUT
            echo "best=N/A" >> $GITHUB_OUTPUT
            echo "max_diff=N/A" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Parse all fields from result.json in one pass
          python3 - <<'PY'
          import json, os, sys, math

          with open('result.json') as f:
              d = json.load(f)

          status    = d.get('status', 'UNKNOWN')
          elapsed   = float(d.get('elapsed_seconds') or 0)
          best_time = d.get('best_time')          # set by LeaderboardManager, None on first submission
          max_diff  = d.get('max_diff')

          emoji_map = {
              'PASS':          '✅',
              'WRONG_ANSWER':  '❌',
              'OOM':           '🧠',
              'TIMEOUT':       '⏱️',
              'RUNTIME_ERROR': '💥',
              'VERIFY_ERROR':  '⚠️',
              'GRADER_ERROR':  '🔧',
          }
          emoji = emoji_map.get(status, '❓')

          score = 1 if status == 'PASS' else 0
          elapsed_display = f'{elapsed:.3f}s' if status == 'PASS' else 'N/A'
          best_display = f'{float(best_time):.3f}s' if best_time is not None else 'N/A'
          max_diff_display = 'N/A' if max_diff is None else str(max_diff)

          print(f'Classmoji pass/fail score: {score}/1 | Status: {status} | Best: {best_display}')

          outputs = os.environ['GITHUB_OUTPUT']
          with open(outputs, 'a') as f:
              f.write(f'score={score}\n')
              f.write(f'status={status}\n')
              f.write(f'elapsed={elapsed_display}\n')
              f.write(f'best={best_display}\n')
              f.write(f'max_diff={max_diff_display}\n')
              f.write(f'emoji={emoji}\n')
          PY

      - name: Submit to Classmoji Autograder
        uses: classmoji/autograder@main
        with:
          score: ${{ steps.score.outputs.score }}
          max-score: 1
          feedback: |
            ## ${{ steps.score.outputs.emoji }} OPS Challenge Autograding

            **Status**: `${{ steps.score.outputs.status }}`
            **Elapsed Time**: ${{ steps.score.outputs.elapsed }}
            **Best Time**: ${{ steps.score.outputs.best }}
            **Max Difference**: ${{ steps.score.outputs.max_diff }}

            ---

            Classmoji shows this result as pass/fail feedback only.
            Race standings are maintained in `LEADERBOARD.md`.

            _Optimize your solution to minimize runtime after it passes correctness checks._
