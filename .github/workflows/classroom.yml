name: GitHub Classroom Workflow

on:
  - push
  - pull_request
  - workflow_dispatch

permissions:
  actions: read
  checks: write
  contents: read

jobs:
  build:
    name: Autograding
    if: github.actor != 'github-classroom[bot]'
    runs-on: [self-hosted, grader]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          GIT_CONFIG_COUNT: 3
          GIT_CONFIG_KEY_0: http.version
          GIT_CONFIG_VALUE_0: HTTP/1.1
          GIT_CONFIG_KEY_1: http.postBuffer
          GIT_CONFIG_VALUE_1: 524288000
          GIT_CONFIG_KEY_2: protocol.version
          GIT_CONFIG_VALUE_2: 1

      - name: OPS Grader
        id: ops-grader
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: OPS Grader
          command: |
            set +e
            PYTHON=/home/runner/miniconda3/envs/ops/bin/python
            ACTIVE_TASK_CONFIG=/srv/opsChallengeNew/tasks/active_task.json
            GRADER_DIR=/srv/opsChallengeNew/grader
            WORKSPACE=$(pwd)

            TASK_JSON=$("${PYTHON}" -c "import json; config=json.load(open('${ACTIVE_TASK_CONFIG}')); print(config['active_task_path'])")
            RESULT_JSON=$(taskset -c 0-7 "${PYTHON}" "${GRADER_DIR}/host_verify_mem.py" "${WORKSPACE}" "${TASK_JSON}")
            GRADER_EXIT=$?
            export RESULT_JSON
            export GRADER_EXIT
            printf '%s\n' "${RESULT_JSON}" > result.json
            echo "${RESULT_JSON}"
            "${PYTHON}" - <<'PY'
            import json
            import os
            import sys

            try:
                result = json.loads(os.environ.get("RESULT_JSON", "{}"))
            except json.JSONDecodeError:
                with open("run-time.txt", "w") as f:
                    f.write("status=INVALID_JSON\n")
                print("Autograder did not return valid JSON.", file=sys.stderr)
                raise SystemExit(1)

            status = result.get("status", "UNKNOWN")
            elapsed = result.get("elapsed_seconds")
            with open("run-time.txt", "w") as f:
                f.write(f"status={status}\n")
                if elapsed is not None:
                    f.write(f"elapsed_seconds={elapsed}\n")
                if result.get("max_diff") is not None:
                    f.write(f"max_diff={result['max_diff']}\n")

            if os.environ.get("GRADER_EXIT") != "0" or status != "PASS":
                print(f"Autograder status: {status}", file=sys.stderr)
                if result.get("error"):
                    print(result["error"], file=sys.stderr)
                raise SystemExit(1)
            PY
          timeout: 15
          max-score: 100

      - name: Autograding Reporter
        if: always()
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          OPS-GRADER_RESULTS: "${{ steps.ops-grader.outputs.result }}"
        with:
          runners: ops-grader

      - name: Upload run timing
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: classmoji-run-timing-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            result.json
            run-time.txt
          if-no-files-found: warn
          retention-days: 30
